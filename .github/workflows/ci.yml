name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pyarrow "ibis-framework[duckdb]" pandas fastapi "uvicorn[standard]" \
                      dash pytest pytest-asyncio tomli redis "python-jose[cryptography]"

      - name: Install pivot-engine (editable)
        run: pip install -e .

      - name: Run tests
        run: |
          python -m pytest tests/test_packaging_smoke.py \
                           tests/test_docs_examples_contract.py \
                           tests/test_multi_instance_isolation.py \
                           tests/test_dash_runtime_callbacks.py \
                           tests/test_session_request_gate.py \
                           tests/test_runtime_service.py \
                           -v

  package-build:
    name: Package Build Smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install --upgrade pip build twine

      - name: Build distribution
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Install from wheel and smoke test
        run: |
          pip install dist/*.whl
          python -c "import pivot_engine; print('Import smoke: OK')"
