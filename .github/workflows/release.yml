name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckdb pyarrow "ibis-framework[duckdb]" pandas fastapi "uvicorn[standard]" \
                      dash pytest pytest-asyncio tomli redis "python-jose[cryptography]" build twine

      - name: Install pivot-engine (editable)
        run: pip install -e .

      - name: Validate tag/version parity
        run: python scripts/ci/check_tag_version.py

      - name: Run release gate tests
        run: |
          python -m pytest tests/test_packaging_smoke.py \
                           tests/test_docs_examples_contract.py \
                           tests/test_multi_instance_isolation.py \
                           tests/test_dash_runtime_callbacks.py \
                           tests/test_session_request_gate.py \
                           tests/test_runtime_service.py \
                           -v

      - name: Build distribution
        run: python -m build

      - name: Validate artifacts with twine check
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
